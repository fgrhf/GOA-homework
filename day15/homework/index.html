<!DOCTYPE html>

<body>

            <p style="color: blue;">ღამის ქალაქის განათება</p>
            <img src="https://www.timeoutdubai.com/cloud/timeoutdubai/2021/11/18/Tbilisi-georgia.jpg" style="border: 3px solid #333; border-radius: 15px;"

    <footer style="background-color: #333; color: white; padding: 15px;">
