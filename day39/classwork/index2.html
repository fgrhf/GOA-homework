<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Insights Hero</title>
<link rel="stylesheet" href="style2.css">
</head>
<body>
<div class="card">


<div class="panel-left">

    <div class="content">
    <h1 class="headline">
        Get insights that help your business grow.
    </h1>
    <p class="description">
        Discover the benefits of data analytics and make better
        decisions regarding revenue, customer experience, and
        overall efficiency.
    </p>
    </div>

    <div class="stats">
    <div class="stat-item">
        <p class="stat-value">10k+</p>
        <p class="stat-label">Companies</p>
    </div>
    <div class="stat-item">
        <p class="stat-value">314</p>
        <p class="stat-label">Templates</p>
    </div>
    <div class="stat-item">
        <p class="stat-value">12M+</p>
        <p class="stat-label">Queries</p>
    </div>
    </div>

</div>


<div class="panel-right">
    <div class="glow"></div>
    <div class="scene">
    <div class="person-1"></div>
    <div class="person-2"></div>
    <div class="laptop"></div>
    <div class="desk"></div>
    </div>
</div>

</div>

</div>
</body>
</html>
