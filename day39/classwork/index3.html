<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Result Card</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style3.css" />
</head>
<body>

<div class="card">


    <div class="panel-result">
    <p class="result-title">Your Result</p>

    <div class="score-circle">
        <p class="score-number">76</p>
        <p class="score-total">of 100</p>
    </div>

    <p class="result-grade">Great</p>
    <p class="result-desc">You scored higher than 65% of the people who have taken these tests.</p>
    </div>

    <!-- RIGHT -->
    <div class="panel-summary">
    <p class="summary-title">Summary</p>

    <div class="summary-list">

        <div class="summary-item reaction">
        <div class="item-left">
            <p class="item-icon">⚡</p>
            <p class="item-name">Reaction</p>
        </div>
        <p class="item-score">80 <span>/ 100</span></p>
        </div>

        <div class="summary-item memory">
        <div class="item-left">
            <p class="item-icon">🧠</p>
            <p class="item-name">Memory</p>
        </div>
        <p class="item-score">92 <span>/ 100</span></p>
        </div>

        <div class="summary-item verbal">
        <div class="item-left">
            <p class="item-icon">💬</p>
            <p class="item-name">Verbal</p>
        </div>
        <p class="item-score">61 <span>/ 100</span></p>
        </div>

        <div class="summary-item visual">
        <div class="item-left">
            <p class="item-icon">👁</p>
            <p class="item-name">Visual</p>
        </div>
        <p class="item-score">73 <span>/ 100</span></p>
        </div>

    </div>

    <button class="btn-continue">Continue</button>
    </div>

</div>

</body>
</html>
