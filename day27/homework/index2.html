<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>დავალება 9 - ფორმები</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <div class="container">

        <div class="card sign-in-card">
            <h2>Sign in</h2>
            <form>
                <div class="input-group">
                    <label for="signin-email">Email</label>
                    <input type="email" id="signin-email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label for="signin-password">Password</label>
                    <input type="password" id="signin-password" required>
                </div>
                <button type="submit" class="btn btn-purple">Sign in</button>
            </form>
        </div>

        <div class="card event-card">
            <h2>Event Registration</h2>
            <p class="subtitle">Register with us to get more details.</p>

            <form>
                <div class="row">
                    <div class="input-group width-50">
                        <input type="text" placeholder="First Name" required>
                    </div>
                    <div class="input-group width-50">
                        <input type="text" placeholder="Last Name" required>
                    </div>
                </div>

                <div class="input-group">
                    <input type="email" placeholder="Email" required>
                </div>

                <div class="input-group">
                    <input type="tel" placeholder="Phone" required>
                </div>
                <div class="input-group">
                    <input type="text" placeholder="Topic" required>
                </div>

                <div class="input-group">
                    <input type="text" placeholder="Preferred Slot" required>
                </div>

                <button type="submit" class="btn btn-pink">Sign me up</button>
            </form>
        </div>

    </div>

</body>
</html>
