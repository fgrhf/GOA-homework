<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>User personal information</h2>
    <form>
        <label for="name">name:</label><br>
        <input type="text" placeholder="your name" id="name" name="name"><br><br>
        <label for="email">email:</label><br>
        <input type="email" placeholder="your email" id="email" name="email"><br><br>
        <label for="password">password:</label><br>
        <input type="password" placeholder="your password" id="password" name="password"><br><br>
        <label for="">enter your gender</label><br><br>
        <input type="radio" id="male" name="gender">
        <label for="male">male</label><br>
        <input type="radio" id="female" name="gender">
        <label for="female">female</label><br>
        <input type="radio" id="other" name="gender">
        <label for="others">others</label><br>
        <br><br>
        <button type="submit">submit</button>

    </form>
    <!-- 
    form-მმთავარი თეგი ფორმისთვის;
    input-ინფორმაციის შესაყვანი ველი (ატრიბუტები: type, placeholder);
    label-სახელი input-ისთვის;
    submit button-ინფორმაციის დასადასტურებლად;
    name-მონაცემის სწორად გაგზავნისთვის.
    -->
    
    <!-- დავალება 4 -->
    <!-- name ატრებუტი არის იმისთვის,რომ მონაცემი სწორედ გაიგზავნოს და დამუშავდეს. -->
    <!--  დავალება 5 -->
    <!-- value ატრიბუტი ინახავს ან განსაზღვრავს ველის მნიშვნელობას.  -->
    <!-- დავალება 6 -->
    <!-- form-submitting არის პროცესი, როდესაც ველში შეყვანილი მონაცემი იგზავნება სერვერზე და ინახება ან მუშავდება. -->

</body>
</html>
