<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container-1">
        <div class="box-1">1</div>
        <div class="box-2">2</div>
        <div class="box-3">3</div>
        <div class="box-4">4</div>
    </div>


    <div class="container-2">
        <div class="shrink-1">1</div>
        <div class="shrink-2">2</div>
        <div class="shrink-3">3</div>
    </div>


    <div class="direction-container row-dir">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>

    <div class="direction-container col-dir">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>

    <div class="direction-container row-rev-dir">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>

    <div class="direction-container col-rev-dir">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
</body>
</html>
